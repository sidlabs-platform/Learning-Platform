# Alembic configuration file for the Learning Platform MVP.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory, relative to the project root.
script_location = src/migrations

# Template used to generate migration script file names.
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file.
# Leave empty to use local timezone.
timezone =

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory.
sourceless = false

# Version location specification; this defaults to src/migrations/versions.
# When using multiple version directories, initial revisions must be specified
# with --version-path.
version_locations = %(here)s/src/migrations/versions

# Version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. Note that this setting is only used when you specify multiple
# version_locations.
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako;
# defaults to utf-8.
output_encoding = utf-8

# The database URL is read from the DATABASE_URL environment variable in env.py.
# This entry is a fallback for commands that don't use env.py (rarely needed).
sqlalchemy.url = sqlite+aiosqlite:///./learning_platform.db


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
