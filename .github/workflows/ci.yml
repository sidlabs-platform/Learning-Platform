name: CI — Build & Test

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check (py_compile)
        run: |
          echo "Running py_compile on all Python files in src/..."
          find src/ -name "*.py" -print0 | xargs -0 -I {} python -m py_compile {}
          echo "✅ All files pass syntax check"

      - name: Import validation
        run: |
          echo "Validating top-level package imports..."
          cd src && python -c "
          import importlib, pathlib, sys
          failures = []
          for f in pathlib.Path('.').rglob('*.py'):
              if f.name.startswith('_'):
                  continue
              module = str(f.with_suffix('')).replace('/', '.')
              try:
                  importlib.import_module(module)
              except Exception as e:
                  failures.append((module, str(e)))
          if failures:
              for mod, err in failures:
                  print(f'❌ {mod}: {err}')
              sys.exit(1)
          else:
              print('✅ All modules importable')
          "

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          if [ -d tests ] && find tests/ -name "test_*.py" | grep -q .; then
            python -m pytest tests/ -v --tb=short --strict-markers
          else
            echo "⚠️ No test files found — skipping (tests will be required once test suite exists)"
          fi

  lint:
    name: Lint (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: |
          if [ -d src ]; then
            ruff check src/ --output-format=github
          fi
